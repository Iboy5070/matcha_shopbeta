[phases.setup]
nixPkgs = ["python311", "gettext"]

[phases.build]
cmds = [
  "pip install -r requirements.txt",
  "python manage.py collectstatic --noinput",
  "python manage.py compilemessages"
]

[start]
cmd = "python manage.py migrate --noinput && gunicorn config.wsgi --workers 2 --bind 0.0.0.0:$PORT --timeout 60"
