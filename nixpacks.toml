[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "gettext"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[phases.build]
cmds = [
  "python manage.py collectstatic --noinput",
  "python manage.py compilemessages"
]

[start]
# migrate ເທົ່ານັ້ນ — seed ຮັນຄັ້ງດຽວຕອນ deploy ຄັ້ງທຳອິດ (ໃຫ້ cold start ໄວຂຶ້ນ)
cmd = "python manage.py migrate --noinput && gunicorn config.wsgi --workers 1 --bind 0.0.0.0:$PORT --timeout 120 --keep-alive 65 --preload"
