[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "gettext"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[phases.build]
cmds = [
  "python manage.py collectstatic --noinput",
  "python manage.py compilemessages"
]

[start]
cmd = "python manage.py migrate --noinput && python manage.py create_admin && python manage.py seed_demo && python manage.py seed_catalog && gunicorn config.wsgi --workers 2 --bind 0.0.0.0:$PORT --timeout 60"
