[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "gettext"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[phases.build]
cmds = [
  "python manage.py collectstatic --noinput",
  "python manage.py compilemessages",
  "python manage.py migrate --noinput",
]

[start]
cmd = "mkdir -p media/slips && exec gunicorn config.wsgi --workers 1 --bind 0.0.0.0:$PORT --timeout 120 --keep-alive 65"
