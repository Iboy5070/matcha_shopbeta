services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: matcha
      POSTGRES_PASSWORD: matcha
      POSTGRES_DB: matcha_shop
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U matcha -d matcha_shop"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
