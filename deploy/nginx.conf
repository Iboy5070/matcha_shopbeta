server {
    listen 80;
    server_name YOUR_DOMAIN.COM www.YOUR_DOMAIN.COM;

    # Redirect HTTP → HTTPS (certbot will add the 443 block below)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name YOUR_DOMAIN.COM www.YOUR_DOMAIN.COM;

    # SSL — certbot จะเติมให้อัตโนมัติ
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN.COM/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN.COM/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20M;

    # Static files (whitenoise จัดการแล้ว แต่ nginx เร็วกว่า)
    location /static/ {
        alias /home/deploy/matcha_shopbeta/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Media files (รูปสินค้า, slip uploads)
    location /media/ {
        alias /home/deploy/matcha_shopbeta/media/;
        expires 7d;
    }

    # Proxy ไป gunicorn
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
