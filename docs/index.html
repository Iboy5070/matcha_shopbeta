<!DOCTYPE html>
<html lang="lo">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MATCHAZUKI — ກຳລັງເປີດ...</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, sans-serif;
      background: #f7f5f0;
      color: #1a1a1a;
      padding: 1.5rem;
    }
    .card {
      max-width: 420px;
      width: 100%;
      background: #fff;
      border-radius: 1rem;
      padding: 2rem;
      text-align: center;
      box-shadow: 0 8px 30px rgba(45, 90, 61, 0.12);
    }
    h1 { color: #2d5a3d; font-size: 1.5rem; margin: 0 0 0.5rem; }
    p { color: #5c5c5c; line-height: 1.5; }
    .spinner {
      width: 40px; height: 40px; margin: 1rem auto;
      border: 3px solid #e8e8e8;
      border-top-color: #2d5a3d;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    a { color: #2d5a3d; }
  </style>
</head>
<body>
  <div class="card">
    <h1>MATCHAZUKI</h1>
    <div class="spinner" aria-hidden="true"></div>
    <p id="msg">ກຳລັງເປີດຮ້ານ... ກະລຸນາລໍສັກຄູ່</p>
    <p class="small"><a id="direct" href="#">ເຂົ້າເວັບໂດຍກົງ</a></p>
  </div>
  <script>
    const SHOP = "https://matcha-shopbeta.onrender.com/";
    const msg = document.getElementById("msg");
    const direct = document.getElementById("direct");
    direct.href = SHOP;

    async function wake() {
      for (let i = 1; i <= 12; i++) {
        msg.textContent = "ກຳລັງເຊື່ອມຕໍ່... (" + i + "/12)";
        try {
          const r = await fetch(SHOP + "healthz/", { cache: "no-store" });
          if (r.ok) {
            window.location.replace(SHOP);
            return;
          }
        } catch (e) {}
        await new Promise(r => setTimeout(r, 5000));
      }
      msg.textContent = "ເປີດບໍ່ສຳເລັດ — ກົດລິ້ກຂ້າງລຸ່ມ ແລ້ວ reload";
    }
    wake();
  </script>
</body>
</html>
