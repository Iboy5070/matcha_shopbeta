<!DOCTYPE html>
<html lang="lo">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>MATCHAZUKI — ກຳລັງເປີດ...</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, "Sarabun", sans-serif;
      background: #f7f5f0;
      color: #1a1a1a;
      padding: 1.5rem;
    }
    .card {
      max-width: 420px;
      width: 100%;
      background: #fff;
      border-radius: 1rem;
      padding: 2rem;
      text-align: center;
      box-shadow: 0 8px 30px rgba(45, 90, 61, 0.12);
    }
    h1 { color: #2d5a3d; font-size: 1.5rem; margin: 0 0 0.5rem; }
    p { color: #5c5c5c; line-height: 1.5; margin: 0.5rem 0; }
    .spinner {
      width: 40px; height: 40px; margin: 1rem auto;
      border: 3px solid #e8e8e8;
      border-top-color: #2d5a3d;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    a { color: #2d5a3d; font-weight: 600; }
    .btn-wa {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.6rem 1.2rem;
      background: #25d366;
      color: #fff !important;
      text-decoration: none;
      border-radius: 999px;
      font-weight: 600;
    }
    .small { font-size: 0.875rem; opacity: 0.85; }
  </style>
</head>
<body>
  <div class="card">
    <h1>MATCHAZUKI</h1>
    <div class="spinner" aria-hidden="true"></div>
    <p id="msg">ກຳລັງເປີດຮ້ານ... ກະລຸນາລໍສັກຄູ່</p>
    <p class="small">ເວັບຟຣີ — ຄັ້ງທຳອິດອາດໃຊ້ເວລາ 30–60 ວິນາທີ</p>
    <p id="wa-wrap" hidden>
      <a class="btn-wa" id="wa" href="#" target="_blank" rel="noopener">ສັ່ງຊື້ຜ່ານ WhatsApp</a>
    </p>
    <p class="small mt-3"><a id="direct" href="#">ເຂົ້າເວັບໂດຍກົງ</a></p>
  </div>
  <script>
    const SHOP = "https://matcha-shopbeta.onrender.com/";
    const WHATSAPP = ""; /* ໃສ່ https://wa.me/85620XXXXXXXX ຖ້າມີ */

    const msg = document.getElementById("msg");
    const direct = document.getElementById("direct");
    direct.href = SHOP;

    if (WHATSAPP) {
      document.getElementById("wa").href = WHATSAPP;
      document.getElementById("wa-wrap").hidden = false;
    }

    async function wake() {
      const delays = [2000, 3000, 4000, 5000, 5000, 5000, 5000, 5000];
      for (let i = 0; i < delays.length; i++) {
        msg.textContent = "ກຳລັງເຊື່ອມຕໍ່... (" + (i + 1) + "/" + delays.length + ")";
        try {
          const ctrl = new AbortController();
          const t = setTimeout(function () { ctrl.abort(); }, 25000);
          const r = await fetch(SHOP + "healthz/", { cache: "no-store", signal: ctrl.signal });
          clearTimeout(t);
          if (r.ok) {
            window.location.replace(SHOP);
            return;
          }
        } catch (e) {}
        await new Promise(function (r) { setTimeout(r, delays[i]); });
      }
      msg.textContent = "ເປີດບໍ່ສຳເລັດ — ກົດລິ້ກຂ້າງລຸ່ມ ແລ້ວ reload";
    }
    wake();
  </script>
</body>
</html>
