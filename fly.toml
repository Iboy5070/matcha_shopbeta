app = "matcha-shop"
primary_region = "sin"

[build]

[env]
  PORT = "8080"
  DJANGO_SETTINGS_MODULE = "config.settings"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
