{% extends "staff/base.html" %}
{% load i18n static %}
{% block body %}
<div class="mz-staff-shell">
  {% include "staff/_header.html" %}
  {% if messages %}
  <div class="container pt-3">
    {% for message in messages %}
    <div class="alert alert-{{ message.tags }} mb-0">{{ message }}</div>
    {% endfor %}
  </div>
  {% endif %}
  <div class="container py-4">
    <div class="row g-4">
      <div class="col-lg-3">
        <div class="mz-staff-side-card">
          {% include "staff/_nav.html" %}
        </div>
      </div>
      <div class="col-lg-9">
        {% block staff_content %}{% endblock %}
      </div>
    </div>
  </div>
</div>
{% endblock %}
