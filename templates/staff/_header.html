{% load i18n static %}
<header class="mz-staff-header">
  <div class="container d-flex flex-wrap justify-content-between align-items-center gap-2">
    <div class="d-flex align-items-center gap-2">
      <a href="{% url 'staff_dashboard' %}" class="d-flex align-items-center gap-2 text-decoration-none text-dark">
        <img src="{% static 'img/icons/logo-cup.png' %}" alt="" width="36" height="36">
        <div>
          <div class="fw-bold">{{ shop_brand }}</div>
          <div class="small text-muted">{% trans "Staff portal" %}</div>
        </div>
      </a>
    </div>
    <div class="d-flex align-items-center gap-2">
      <span class="small text-muted">{{ user.get_username }}</span>
      <a class="btn btn-sm btn-outline-secondary" href="{% url 'store_home' %}">{% trans "Shop" %}</a>
      <a class="btn btn-sm btn-outline-danger" href="{% url 'staff_logout' %}">{% trans "Log out" %}</a>
    </div>
  </div>
</header>
