{% load i18n static %}
<div class="modal fade mz-auth-modal" id="mzLoginModal" tabindex="-1" aria-labelledby="mzLoginModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content mz-auth-modal-content">
      <div class="modal-header border-0 pb-0">
        <h2 class="modal-title mz-auth-modal-title" id="mzLoginModalLabel">{% trans "Welcome!" %}</h2>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body pt-2">
        <form method="post" action="{% url 'store_login' %}">
          {% csrf_token %}
          <input type="hidden" name="next" value="{{ request.get_full_path }}">
          <div class="mb-3">
            <input class="form-control form-control-lg mz-auth-input" type="text" name="email" required
                   placeholder="{% trans 'Email or username' %}" autocomplete="username">
          </div>
          <div class="mb-3">
            <div class="mz-password-wrap">
              <input class="form-control form-control-lg mz-auth-input" id="mzLoginPassword" type="password" name="password" required
                     placeholder="{% trans 'Password' %}" autocomplete="current-password">
              <button type="button" class="mz-password-toggle-btn" aria-label="{% trans 'Show password' %}" aria-pressed="false">
                <svg class="mz-password-icon-show" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                  <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/>
                </svg>
                <svg class="mz-password-icon-hide d-none" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
              </button>
            </div>
          </div>
          <div class="d-flex justify-content-between align-items-center mb-3 small">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" name="remember" id="mzRemember" value="1">
              <label class="form-check-label text-muted" for="mzRemember">{% trans "Remember me" %}</label>
            </div>
            <a class="text-muted mz-auth-link" href="{% url 'store_register' %}">{% trans "Forgot password?" %}</a>
          </div>
          <button type="submit" class="btn mz-btn-primary btn-lg w-100 mb-3">{% trans "Log in" %}</button>
        </form>

        {% if google_oauth_enabled %}
        <a class="btn mz-btn-google w-100" href="{% url 'store_google_login' %}?next={{ request.get_full_path|urlencode }}">
          <svg class="mz-google-g" width="20" height="20" viewBox="0 0 48 48" aria-hidden="true">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          </svg>
          <span>Google</span>
        </a>
        {% endif %}

        <p class="text-center text-muted small mt-4 mb-0">
          {% trans "No account yet?" %}
          <a href="{% url 'store_register' %}" class="mz-auth-link">{% trans "Register" %}</a>
        </p>
      </div>
    </div>
  </div>
</div>
