{% load i18n %}
<form class="mz-slip-form" method="post" action="{% url 'store_confirm_payment' %}" enctype="multipart/form-data">
  {% csrf_token %}
  {% if prefill_order_no %}
  <input type="hidden" name="order_no" value="{{ prefill_order_no }}">
  <input type="hidden" name="paid_amount" value="{{ prefill_paid_amount }}">
  <input type="hidden" name="bank_name" value="{{ prefill_bank_name|default:bank_name }}">
  {% else %}
  <div class="mb-3">
    <label class="form-label">{% trans "Order no." %} *</label>
    <input class="form-control form-control-lg" name="order_no" value="{{ prefill_order_no|default:'' }}" required placeholder="WEB2026...">
  </div>
  <div class="mb-3">
    <label class="form-label">{% trans "Paid amount" %} *</label>
    <input class="form-control form-control-lg" name="paid_amount" type="number" step="0.01" value="{{ prefill_paid_amount|default:'' }}" required>
  </div>
  <input type="hidden" name="bank_name" value="{{ prefill_bank_name|default:bank_name }}">
  {% endif %}

  <div class="mb-3">
    <label class="form-label fw-bold">{% trans "Transfer slip photo" %} *</label>
    <input class="form-control form-control-lg" name="slip_image" type="file" accept="image/*" required>
    <div class="form-text">{% trans "Screenshot from BCEL One or your bank app." %}</div>
  </div>
  <div class="mb-4">
    <label class="form-label">{% trans "Note" %} <span class="text-muted fw-normal">({% trans "optional" %})</span></label>
    <input class="form-control" name="note" placeholder="{% trans 'Any extra info for the shop' %}">
  </div>
  <button class="btn mz-btn-primary btn-lg w-100" type="submit">{% trans "Send slip" %}</button>
</form>
