{% load i18n %}
<nav class="mz-steps" aria-label="{% trans 'Order progress' %}">
  <ol class="mz-steps-list mz-steps-3">
    <li class="mz-step {% if step >= 1 %}mz-step-done{% endif %} {% if step == 1 %}mz-step-current{% endif %}">
      <span class="mz-step-num">1</span>
      <span class="mz-step-label">{% trans "Cart" %}</span>
    </li>
    <li class="mz-step {% if step >= 2 %}mz-step-done{% endif %} {% if step == 2 %}mz-step-current{% endif %}">
      <span class="mz-step-num">2</span>
      <span class="mz-step-label">{% trans "Checkout" %}</span>
    </li>
    <li class="mz-step {% if step >= 3 %}mz-step-done{% endif %} {% if step == 3 %}mz-step-current{% endif %}">
      <span class="mz-step-num">3</span>
      <span class="mz-step-label">{% trans "Pay & upload slip" %}</span>
    </li>
  </ol>
</nav>
