{% load i18n %}
<div class="mb-3{% if extra_class %} {{ extra_class }}{% endif %}">
  <label class="form-label" for="{{ field.id_for_label }}">
    {{ field.label }}{% if field.field.required %} *{% endif %}
  </label>
  {% if field.field.widget.input_type == 'password' %}
  <div class="mz-password-wrap">
    {{ field }}
    <button type="button" class="mz-password-toggle-btn" aria-label="{% trans 'Show password' %}" aria-pressed="false">
      <svg class="mz-password-icon-show" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/>
      </svg>
      <svg class="mz-password-icon-hide d-none" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>
      </svg>
    </button>
  </div>
  {% else %}
  {{ field }}
  {% endif %}
  {% if field.help_text %}
  <div class="form-text">{{ field.help_text }}</div>
  {% endif %}
  {% if field.errors %}
  <div class="text-danger small mt-1">{{ field.errors.0 }}</div>
  {% endif %}
</div>
