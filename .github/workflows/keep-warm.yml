# Ping Render every 5 min so the free tier stays awake (15 min idle = sleep).
name: Keep Render warm

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health check
        run: curl -sf --max-time 60 https://matcha-shopbeta.onrender.com/healthz/
